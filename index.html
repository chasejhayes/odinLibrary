<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js" defer></script>
    
</head>
<body>

    <h1>Library</h1>

    <div id="container"></div>

    <dialog id="dialog">
        <form id="form" action="" method="dialog">
            <div class="form_element">
                <label for="book_title">Title: </label>
                <input type="text" id="book_title" name="title">
            </div>
            <div class="form_element">
                <label for="book_author">Author: </label>
                 <input type="text" id="book_author" name="author">
            </div>
            <div class="form_element">
                <label for="page_count">Page Count: </label>
                 <input type="text" id="page_count" name="page_count">
            </div>
            <button type="submit" value="submit">Submit</button>
        </form>
    </dialog>

<button onclick="document.getElementById('dialog').showModal()">
  Add Book
</button>
    
    
</body>
</html>
